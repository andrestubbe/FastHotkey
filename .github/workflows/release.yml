name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.3
    
    - name: Build native DLL
      run: |
        mkdir build
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
        cl.exe /LD /O2 /I"%JAVA_HOME%\include" /I"%JAVA_HOME%\include\win32" ^
          native\fasthotkey.cpp user32.lib "%JAVA_HOME%\lib\jvm.lib" ^
          /Fe:build\fasthotkey.dll /EHsc /std:c++17 /W3
    
    - name: Build JAR with bundled DLL
      run: mvn -B package -DskipTests
    
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          target/fasthotkey-*.jar
        name: "FastHotkey ${{ github.ref_name }} — Global System-Wide Hotkeys for Java"
        body: |
          ## FastHotkey ${{ github.ref_name }}

          **Ultra-fast global hotkey library for Java — system-wide hotkeys even when your app is not focused**

          ### What's New
          - CLI Demo with clean output
          - Minimized native debug output
          - Screenshot in README

          ### Run the Demo
          ```bash
          java -jar fasthotkey-1.0.0.jar fasthotkey.Demo
          ```
          Press **Ctrl+Shift+H** to test, **Ctrl+C** to exit.

          ### Installation
          **Maven:**
          ```xml
          <dependency>
              <groupId>io.github.andrestubbe</groupId>
              <artifactId>fasthotkey</artifactId>
              <version>1.0.0</version>
          </dependency>
          ```
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
